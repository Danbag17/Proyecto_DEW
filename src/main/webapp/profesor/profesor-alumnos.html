<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Alumnos asignatura · NOL 25/26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/nol.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="profesor-asignaturas.html">NOL Profesor</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm me-2" href="profesor-asignaturas.html">Asignaturas</a>
        <button class="btn btn-outline-warning btn-sm" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="h3">Alumnos de <span id="asigTitle"></span></h1>
    <p class="text-muted">Modifica la nota y pulsa guardar.</p>

    <div class="alert alert-danger d-none" id="errorBox"></div>
    <div class="alert alert-success d-none" id="okBox">Nota actualizada correctamente.</div>

    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>DNI</th>
            <th>Alumno</th>
            <th>Nota</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="alumnosBody"></tbody>
      </table>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    var acronimo = qs('asig');
    setText('asigTitle', acronimo || '');

    function renderAlumnos(data) {
      var alumnos = safeArray(data);
      var body = document.getElementById('alumnosBody');

      if (!alumnos.length) {
        body.innerHTML = '<tr><td colspan="4" class="text-muted">No hay alumnos en esta asignatura.</td></tr>';
        return;
      }

      var html = '';
      for (var i = 0; i < alumnos.length; i++) {
        var a = alumnos[i];
        var dni = getDniAlumno(a);
        var nota = a.nota || a.calificacion || a.calificacionNumerica || '';

        html += '<tr>';
        html += '<td>' + dni + '</td>';
        html += '<td>' + getNombreAlumno(a) + '</td>';
        html += '<td style="max-width: 140px;">';
        html += '<input class="form-control form-control-sm" id="nota_' + dni + '" value="' + nota + '" type="number" min="0" max="10" step="0.1">';
        html += '</td>';
        html += '<td>';
        html += '<button class="btn btn-sm btn-primary" onclick="guardarNota(\'' + acronimo + '\', \'' + dni + '\')">Guardar</button>';
        html += '</td>';
        html += '</tr>';
      }

      body.innerHTML = html;
    }

    function guardarNota(asig, dni) {
      hideError();
      var okBox = document.getElementById('okBox');
      okBox.classList.add('d-none');

      var input = document.getElementById('nota_' + dni);
      var nota = input ? input.value : '';

      ajax(API.profesorNota(asig, dni), {
        method: 'POST',
        body: JSON.stringify({ nota: parseFloat(nota) })
      }).then(function () {
        okBox.classList.remove('d-none');
      }).catch(showError);
    }

    if (!acronimo) {
      showError(new Error('Falta el parámetro asig en la URL.'));
    } else {
      ajax(API.profesorAlumnos(acronimo)).then(renderAlumnos).catch(showError);
    }
  </script>
</body>
</html>
