<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Mis asignaturas · NOL 25/26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/nol.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="alumno-asignaturas.html">NOL Alumno</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm me-2" href="alumno-expediente.html">Expediente</a>
        <button class="btn btn-outline-warning btn-sm" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="h3">Mis asignaturas</h1>
    <p class="text-muted">Selecciona una asignatura para consultar el detalle de tu nota.</p>

    <div class="alert alert-danger d-none" id="errorBox"></div>
    <div class="row g-3" id="asignaturasBox"></div>
  </main>


  <script src="../js/api.js"></script>
  <script>
    function renderAsignaturas(data) {
      var box = document.getElementById('asignaturasBox');
      var asignaturas = safeArray(data);

      if (!asignaturas.length) {
        box.innerHTML = '<div class="col-12"><div class="alert alert-info">No hay asignaturas disponibles.</div></div>';
        return;
      }

      var html = '';
      for (var i = 0; i < asignaturas.length; i++) {
        var a = asignaturas[i];
        var acr = getAcronimo(a);
        var nombre = getNombreAsignatura(a);
        var nota = a.nota || a.calificacion || a.calificacionNumerica;

        html += '<div class="col-md-4">';
        html += '  <div class="card h-100 shadow-sm">';
        html += '    <div class="card-body">';
        html += '      <h2 class="h5">' + acr + '</h2>';
        html += '      <p class="mb-1">' + nombre + '</p>';
        html += '      <p class="text-muted small">Nota: ' + formatNota(nota) + '</p>';
        html += '      <a class="btn btn-primary btn-sm" href="alumno-detalle.html?asig=' + encodeURIComponent(acr) + '">Ver detalle</a>';
        html += '    </div>';
        html += '  </div>';
        html += '</div>';
      }

      box.innerHTML = html;
    }

    ajax(API.alumnoAsignaturas).then(renderAsignaturas).catch(showError);
  </script>
</body>
</html>
