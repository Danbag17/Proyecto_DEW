<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Detalle asignatura · NOL 25/26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/nol.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="alumno-asignaturas.html">NOL Alumno</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm me-2" href="alumno-asignaturas.html">Asignaturas</a>
        <button class="btn btn-outline-warning btn-sm" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="alert alert-danger d-none" id="errorBox"></div>

    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h3" id="titulo">Detalle de asignatura</h1>
        <p class="text-muted" id="subtitulo"></p>

        <dl class="row mt-4">
          <dt class="col-sm-3">Acrónimo</dt>
          <dd class="col-sm-9" id="acr"></dd>

          <dt class="col-sm-3">Nombre</dt>
          <dd class="col-sm-9" id="nombre"></dd>

          <dt class="col-sm-3">Curso</dt>
          <dd class="col-sm-9" id="curso"></dd>

          <dt class="col-sm-3">Cuatrimestre</dt>
          <dd class="col-sm-9" id="cuatrimestre"></dd>

          <dt class="col-sm-3">Créditos</dt>
          <dd class="col-sm-9" id="creditos"></dd>

          <dt class="col-sm-3">Nota</dt>
          <dd class="col-sm-9 fw-bold" id="nota"></dd>
        </dl>
      </div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    var acronimo = qs('asig');

    if (!acronimo) {
      showError(new Error('Falta el parámetro asig en la URL.'));
    } else {
    	ajax(API.alumnoDetalle(acronimo))
    	  .then(function (data) {

    	    var m = data.matricula || {};
    	    var a = data.asignatura || {};

    	    setText('acr', a.acronimo || m.asignatura || '');
    	    setText('nombre', a.nombre || '');
    	    setText('curso', a.curso || '');
    	    setText('cuatrimestre', a.cuatrimestre || '');
    	    setText('creditos', a.creditos || '');
    	    setText('nota', formatNota(m.nota));
    	  })
    	  .catch(showError);
    }
  </script>
</body>
</html>
