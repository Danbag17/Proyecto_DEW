<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Expediente · NOL 25/26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/nol.css">
  <style>
    @media print {
      nav, .no-print { display: none !important; }
      body { background: white !important; }
      .card { box-shadow: none !important; border: 0 !important; }
    }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="alumno-asignaturas.html">NOL Alumno</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm me-2" href="alumno-asignaturas.html">Asignaturas</a>
        <button class="btn btn-outline-warning btn-sm" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="alert alert-danger d-none" id="errorBox"></div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="h3">Certificado de calificaciones</h1>
            <p class="text-muted">Documento preparado para impresión.</p>
          </div>
          <button class="btn btn-primary no-print" onclick="window.print()">Imprimir</button>
        </div>

        <hr>

        <h2 class="h5" id="alumnoNombre"></h2>
        <p id="alumnoDni" class="text-muted"></p>

        <table class="table table-striped mt-4">
          <thead>
            <tr>
              <th>Asignatura</th>
              <th>Nombre</th>
              <th>Nota</th>
            </tr>
          </thead>
          <tbody id="expedienteBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    function renderExpediente(data) {
      var alumno = data.datosPersonales || data.alumno || {};
      var notas = data.calificaciones || data.asignaturas || safeArray(data);

      setText('alumnoNombre', getNombreAlumno(alumno));
      setText('alumnoDni', 'DNI: ' + (alumno.dni || ''));

      var body = document.getElementById('expedienteBody');
      var html = '';

      for (var i = 0; i < notas.length; i++) {
        var a = notas[i];
        html += '<tr>';
        html += '<td>' + getAcronimo(a) + '</td>';
        html += '<td>' + getNombreAsignatura(a) + '</td>';
        html += '<td>' + formatNota(a.nota || a.calificacion || a.calificacionNumerica) + '</td>';
        html += '</tr>';
      }

      if (!html) {
        html = '<tr><td colspan="3" class="text-muted">No hay calificaciones disponibles.</td></tr>';
      }

      body.innerHTML = html;
    }

    ajax(API.alumnoExpediente).then(renderExpediente).catch(showError);
  </script>
</body>
</html>
