
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container" id="off">
        <div id="loginContainer">
            <h1>Notas Online</h1>
            <p id="loginText">Bienvenido al sistema de gestión académica. Por favor, identifíquese para acceder.</p>
            <!-- COMPROBAR -->
            <!-- He puesto este Servlet para el form login pero no tengo claro cual se tiene que usar -->
            <form action="LoginRedirectServlet" method="POST">
                <div class="formGroup">
                    <label for="dni">Usuario</label>
                    <input type="text" id="dni" name="dni" required placeholder="Introduce tu identificación">
                </div>
                <div class="formGroup">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>
                <button type="submit">Entrar</button>
            </form>

            <div id="footerInfo">
                2025/2026 DEW - Laboratorio 2
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
