<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Expediente Académico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div id="headerNav">
        <a href="asignaturas.html" id="backLink">Mis Asignaturas</a>
        <a href="LogoutServlet" id="logOut">Cerrar Sesión</a>
    </div>

    <div id="certificadoCabecera">
        <div>
            <h1>Expediente Académico</h1>
            <p>Certificado de calificaciones del alumno.</p>
            <p><strong>Alumno:</strong> <span id="nombreAlumno">Cargando...</span></p>
            <p><strong>DNI/NIA:</strong> <span id="dniAlumno">---</span></p>
            <p><strong>Media global:</strong> <span id="mediaGlobal">---</span></p>
        </div>

        <img src="" id="fotoAlumno" alt="Foto del alumno">
    </div>

    <h2>Relación de asignaturas y calificaciones</h2>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Asignatura</th>
                <th>Nota</th>
            </tr>
        </thead>

        <tbody id="tablaExpediente">
            <tr>
                <td colspan="3">Cargando expediente...</td>
            </tr>
        </tbody>
    </table>

    <div id="acciones">
        <button type="button" onclick="window.print()">Imprimir / guardar como PDF</button>
    </div>

    <div id="footerInfo">
        2025/2026 DEW - Laboratorio 2
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", cargarExpediente);

async function cargarExpediente() {
    const tabla = document.getElementById("tablaExpediente");

    try {
        const response = await fetch("AlumnoExpedienteServlet");

        if (response.status === 401) {
            window.location.href = "login.html?error=session";
            return;
        }

        if (!response.ok) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="3">Error al cargar el expediente.</td>
                </tr>
            `;
            return;
        }

        const expediente = await response.json();

        const alumno = expediente.datosPersonales || {};
        const calificaciones = expediente.calificaciones || [];

        pintarDatosAlumno(alumno);
        pintarCalificaciones(calificaciones);

    } catch (error) {
        console.error("Error cargando expediente:", error);

        tabla.innerHTML = `
            <tr>
                <td colspan="3">No se pudo conectar con el servidor.</td>
            </tr>
        `;
    }
}

function pintarDatosAlumno(alumno) {
    const dni = alumno.dni || alumno.nia || "---";
    const nombre = alumno.nombre || "";
    const apellidos = alumno.apellidos || "";
    const nombreCompleto = `${nombre} ${apellidos}`.trim() || "---";

    document.getElementById("nombreAlumno").textContent = nombreCompleto;
    document.getElementById("dniAlumno").textContent = dni;
    const foto = document.getElementById("fotoAlumno");
    foto.src = "imagen.png";
    foto.onerror = function () {
        this.style.display = "none";
    };
}

function pintarCalificaciones(calificaciones) {
    const tabla = document.getElementById("tablaExpediente");

    tabla.innerHTML = "";

    if (!Array.isArray(calificaciones) || calificaciones.length === 0) {
        tabla.innerHTML = `
            <tr>
                <td colspan="3">No hay calificaciones disponibles.</td>
            </tr>
        `;
        document.getElementById("mediaGlobal").textContent = "---";
        return;
    }

    let suma = 0;
    let contador = 0;

    calificaciones.forEach(item => {
        const codigo = item.acronimo || item.codigo || item.asignatura || "---";
        const nombre = item.nombre || item.nombreAsignatura || item.asignatura || codigo;

        const notaRaw = item.nota ?? item.calificacion ?? item["calificación"] ?? item.calif ?? "---";

        const fila = document.createElement("tr");

        fila.innerHTML = `
            <td>${escapeHtml(codigo)}</td>
            <td>${escapeHtml(nombre)}</td>
            <td>${escapeHtml(notaRaw)}</td>
        `;

        tabla.appendChild(fila);

        const notaNumerica = Number(notaRaw);

        if (!Number.isNaN(notaNumerica)) {
            suma += notaNumerica;
            contador++;
        }
    });

    const media = contador > 0 ? (suma / contador).toFixed(2) : "---";
    document.getElementById("mediaGlobal").textContent = media;
}

function escapeHtml(texto) {
    return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
