<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Login · NOL 25/26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/DEW/css/nol.css">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 720px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Acceso a Notas Online</h1>

        <div class="alert alert-danger d-none" id="errorBox"></div>

        <!-- Este formulario usa vuestro servlet real: LoginRedirectServlet.
             Ese servlet guarda key + dni en sesión y redirige a asignaturas.html. -->
        <form method="post" action="/DEW/j_security_check">
  <div class="mb-3">
    <label class="form-label" for="j_username">DNI</label>
    <input class="form-control" id="j_username" name="j_username" required autocomplete="username">
  </div>

  <div class="mb-3">
    <label class="form-label" for="j_password">Contraseña</label>
    <input class="form-control" id="j_password" name="j_password" type="password" required autocomplete="current-password">
  </div>

  <button class="btn btn-primary w-100" type="submit">Entrar</button>
</form>

        <hr>

        <div class="row g-2 small text-muted">
          <div class="col-md-6">
            <strong>Alumno prueba</strong><br>
            DNI: 12345678W<br>
            Password: 123456
          </div>
          <div class="col-md-6">
            <strong>Profesor prueba</strong><br>
            DNI: 22222222P<br>
            Password: 123456
          </div>
        </div>
      </div>
    </div>

    <p class="mt-3">
      <a href="/DEW/index.html">Volver al inicio</a>
    </p>
  </main>
</body>
</html>
