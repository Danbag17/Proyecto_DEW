<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Redirigiendo · NOL 25/26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4">Comprobando sesión...</h1>
        <p class="text-muted">Detectando si eres alumno o profesor.</p>
        <div class="alert alert-danger d-none" id="errorBox"></div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    // LoginRedirectServlet redirige aquí. Como no guarda rol, probamos primero alumno
    // y después profesor. La primera llamada válida decide la pantalla.
    ajax(API.alumnoAsignaturas)
      .then(function () {
        window.location.href = 'alumno-asignaturas.html';
      })
      .catch(function () {
        ajax(API.profesorAsignaturas)
          .then(function () {
            window.location.href = 'profesor-asignaturas.html';
          })
          .catch(function (err) {
            showError(new Error('No se pudo determinar el tipo de usuario. Revisa LoginRedirectServlet, sesión y servlets. ' + (err.message || err)));
          });
      });
  </script>
</body>
</html>
