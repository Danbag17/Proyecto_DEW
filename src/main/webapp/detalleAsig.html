
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de calificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div id="headerNav">
        <a href="asignaturas.html" id="backLink">Volver a mis asignaturas</a>
        <span>Alumno: <strong id="nombreAlumno">Alumno</strong></span>
    </div>

    <h1 id="nombreAsignatura">Asignatura</h1>
    <h2>Detalle de Calificaciones</h2>

    <div id="infoPanel">
        <div><strong>Profesor: </strong><span id="profesorAsignatura">---</span></div>
        <div><strong>Código: </strong><span id="codigoAsignatura">---</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Actividad / Examen</th>
                <th>Calificación</th>
            </tr>
        </thead>

        <tbody id="tablaDetalle">
            <tr>
                <td colspan="2">Cargando detalle...</td>
            </tr>
        </tbody>
    </table>

    <div id="footerInfo">
        2025/2026 DEW - Laboratorio 2
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", cargarDetalleAsignatura);

async function cargarDetalleAsignatura() {
    const params = new URLSearchParams(window.location.search);
    const asig = params.get("asig");

    const tabla = document.getElementById("tablaDetalle");
    const codigoAsignatura = document.getElementById("codigoAsignatura");
    const nombreAsignatura = document.getElementById("nombreAsignatura");
    const profesorAsignatura = document.getElementById("profesorAsignatura");
    const nombreAlumno = document.getElementById("nombreAlumno");

    if (!asig) {
        codigoAsignatura.textContent = "---";
        nombreAsignatura.textContent = "Asignatura no indicada";

        tabla.innerHTML = `
            <tr>
                <td colspan="2">No se ha indicado ninguna asignatura.</td>
            </tr>
        `;
        return;
    }

    codigoAsignatura.textContent = asig;

    try {
        const response = await fetch("AlumnoDetalleServlet?asig=" + encodeURIComponent(asig));

        if (response.status === 401) {
            window.location.href = "login.html?error=session";
            return;
        }

        if (response.status === 403) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="2">No tienes permisos para consultar esta información.</td>
                </tr>
            `;
            return;
        }

        if (response.status === 400) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="2">Petición incorrecta: falta la asignatura.</td>
                </tr>
            `;
            return;
        }

        if (!response.ok) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="2">Error al cargar el detalle de la asignatura.</td>
                </tr>
            `;
            return;
        }

        const detalle = await response.json();

        pintarCabecera(detalle, asig);
        pintarCalificaciones(detalle);

    } catch (error) {
        console.error("Error cargando detalle:", error);

        tabla.innerHTML = `
            <tr>
                <td colspan="2">No se pudo conectar con el servidor.</td>
            </tr>
        `;
    }
}

function pintarCabecera(detalle, asig) {
    const codigoAsignatura = document.getElementById("codigoAsignatura");
    const nombreAsignatura = document.getElementById("nombreAsignatura");
    const profesorAsignatura = document.getElementById("profesorAsignatura");
    const nombreAlumno = document.getElementById("nombreAlumno");



    const alumno = detalle.alumno || detalle.datosAlumno || detalle.datosPersonales || {};
    const nombreCompletoAlumno = construirNombreAlumno(alumno);

    if (nombreCompletoAlumno) {
        nombreAlumno.textContent = nombreCompletoAlumno;
    }

    const codigo = detalle.acronimo
        || detalle.codigo
        || detalle.asig
        || detalle.asignatura
        || asig;

    const nombre = detalle.nombre
        || detalle.nombreAsignatura
        || detalle.titulo
        || detalle.asignatura
        || codigo;

    const profesor = detalle.profesor
        || detalle.nombreProfesor
        || detalle.profesorAsignatura
        || "---";

    codigoAsignatura.textContent = codigo;
    nombreAsignatura.textContent = nombre;
    profesorAsignatura.textContent = profesor;
}

function construirNombreAlumno(alumno) {
    const nombre = alumno.nombre || "";
    const apellidos = alumno.apellidos || "";
    return `${nombre} ${apellidos}`.trim();
}

function pintarCalificaciones(detalle) {
    const tabla = document.getElementById("tablaDetalle");
    tabla.innerHTML = "";


    const actividades = detalle.actividades
        || detalle.calificaciones
        || detalle.notas
        || detalle.evaluaciones;

    if (Array.isArray(actividades) && actividades.length > 0) {
        actividades.forEach(item => {
            const actividad = item.actividad
                || item.nombre
                || item.descripcion
                || item.tipo
                || "Calificación";

            const nota = item.nota
                ?? item.calificacion
                ?? item["calificación"]
                ?? item.valor
                ?? "---";

            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td>${escapeHtml(actividad)}</td>
                <td>${escapeHtml(nota)}</td>
            `;

            tabla.appendChild(fila);
        });

        return;
    }

    
    const notaFinal = detalle.nota
        ?? detalle.calificacion
        ?? detalle["calificación"]
        ?? detalle.valor
        ?? "---";

    tabla.innerHTML = `
        <tr>
            <td>Calificación final</td>
            <td>${escapeHtml(notaFinal)}</td>
        </tr>
    `;
}

function escapeHtml(texto) {
    return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
